
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SifatDev. | MERN Stack Architect</title>
    <meta name="description" content="Portfolio of Foisal Hasan Sifat - High-performance MERN Stack Architect building the future of the web.">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="shortcut icon" href="./context/favicon.png" >
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Outfit', sans-serif;
        scroll-behavior: smooth;
        -webkit-font-smoothing: antialiased;
      }
      .glass {
        background: rgba(2, 6, 23, 0.75);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }
      .glass-light {
        background: rgba(240, 247, 255, 0.65);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border: 1px solid rgba(37, 99, 235, 0.12);
        box-shadow: 0 8px 32px 0 rgba(37, 99, 235, 0.05);
      }
      .theme-transition {
        transition: background-color 0.8s cubic-bezier(0.4, 0, 0.2, 1), 
                    color 0.8s cubic-bezier(0.4, 0, 0.2, 1),
                    border-color 0.8s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .shadow-cyber { box-shadow: 0 0 30px -5px rgba(250, 204, 21, 0.4); }
      .shadow-royal { box-shadow: 0 15px 45px -12px rgba(37, 99, 235, 0.3); }
      
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb {
        background: #94a3b8;
        border-radius: 10px;
      }
      .dark ::-webkit-scrollbar-thumb { background: #FACC15; }
      
      .preserve-3d { transform-style: preserve-3d; }
    </style>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: { sans: ['Outfit', 'sans-serif'] },
            colors: {
              obsidian: '#020617',
              cyber: '#FACC15',
              royal: '#2563EB',
              prism: '#F0F7FF', // Ice-Azure Secondary Base
            }
          }
        }
      }
    </script>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@^19.2.4",
        "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
        "react/": "https://esm.sh/react@^19.2.4/",
        "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
        "framer-motion": "https://esm.sh/framer-motion@^12.30.0"
      }
    }
    </script>
  <link rel="stylesheet" href="/index.css">
</head>
  <body class="theme-transition overflow-x-hidden">
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
